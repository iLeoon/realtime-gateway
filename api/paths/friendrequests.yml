post:
  summary: Create Friend Request
  description: >
    Sends a friend request to another user.
    The authenticated user becomes the author.
    sender_id is always stored as MIN(authorId, recipientId) to prevent duplicate entries —
    the composite primary key is (sender_id, recipient_id).
    On success returns 201 with a Location header.
  operationId: createFriendRequest
  tags: [FriendRequests]
  security:
    - JWTAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/friendrequest.yml#/FriendRequestBody
        example:
          recipientEmail: "friend@gmail.com"
  responses:
    "201":
      description: Friend request created successfully
      headers:
        Location:
          description: URL identifying the created friend request resource
          schema:
            type: string
            example: http://localhost:7000/api/v1.0/friendrequests/4
      content:
        application/json:
          schema:
            $ref: ../components/friendrequest.yml#/FriendRequest
          example:
            senderId: "1"
            recipientId: "4"
            authorId: "1"
            status: pending
            createdAt: "2026-03-05T11:22:08.048899Z"

    "400":
      description: >
        Invalid request body, unknown fields, duplicate friend request,
        or malformed Authorization header
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            invalidJSON:
              summary: Malformed JSON or unknown field in body
              value:
                error:
                  code: BadRequest
                  message: invalid request JSON format
                  target: RequestBody
                  innererror:
                    code: InvalidFieldDataTypeOrInvalidJSONFormat
            validationError:
              summary: recipientEmail missing or not a valid email address
              value:
                error:
                  code: BadArgumet
                  message: invalid argument
                  target: FriendRequestBody
                  details:
                    - code: email
                      target: recipientEmail
                      message: recipientEmail must be a valid email address
            duplicateRequest:
              summary: A friend request between these two users already exists
              value:
                error:
                  code: BadRequest
                  message: unexpected error on processing the request
                  target: friendRequest
                  innererror:
                    code: DatabaseFailure
                    innererror:
                      code: UserIsPassingInvalidData
            missingAuthHeader:
              summary: Authorization header missing
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthHeader
            invalidAuthFormat:
              summary: Header does not start with "Bearer "
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: InvalidHeaderFormat

    "404":
      description: No user found with the given email address
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: NotFound
              message: resource not found
              target: friendRequest
              innererror:
                code: ResourceNotFound

    "429":
      description: Too many requests — rate limit exceeded for this IP and endpoint
      headers:
        Retry-After:
          description: Duration to wait before retrying (e.g. "2s", "30s")
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: RateLimit
              message: too many requests
              target: ip
              innererror:
                code: RateLimitExceeded

    "401":
      description: JWT is invalid or expired
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: UnauthorizedRequest
              message: invalid token is being used
              target: token
              innererror:
                code: InvalidOrExpiredToken

    "500":
      description: Internal server error — JWT decode failure, missing auth context, or unexpected DB failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            tokenDecodeFailed:
              summary: Unexpected error decoding the JWT
              value:
                error:
                  code: InternalServerError
                  message: unexpected error while trying to decode token
                  target: token
                  innererror:
                    code: UnexpectedInternalError
            missingContext:
              summary: Auth middleware did not inject user ID
              value:
                error:
                  code: InternalServerError
                  message: user id is missing in the request header
                  target: userId
                  innererror:
                    code: MissingUserIdContext
            dbFailure:
              summary: Unexpected database error
              value:
                error:
                  code: InternalServerError
                  message: unexpected error on processing the request
                  target: friendRequest
                  innererror:
                    code: DatabaseFailure
                    innererror:
                      code: WrongSyntax

    "406":
      description: Invalid Accept header — must be application/json or */*
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: StatusNotAccepted
              message: Using invalid accept header format

    "502":
      description: Database network failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: BadGateway
              message: unexpected error on processing the request
              target: friendRequest
              innererror:
                code: DatabaseFailure
                innererror:
                  code: NetworkFailure

    "503":
      description: Database connection pool exhausted or server overloaded
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: ServiceUnavailable
              message: unexpected error on processing the request
              target: friendRequest
              innererror:
                code: DatabaseFailure
                innererror:
                  code: ServiceIsUnavilableDueToManyRequests

    "504":
      description: Database query timed out
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: Timeout
              message: request took so long to process
              target: friendRequest
              innererror:
                code: TimeOutHasBeenExceeded
