get:
  summary: Initiate OAuth Login
  description: >
    Redirects the caller to Google's OAuth2 authorization endpoint.
    Sets two HttpOnly cookies: pkce_verifier (PKCE code verifier) and state (CSRF token).
    These cookies are required for the subsequent callback request.
  operationId: authenticateUser
  tags: [Auth]
  security: []
  responses:
    "302":
      description: Redirect to Google OAuth2 authorization endpoint
      headers:
        Location:
          description: Google OAuth2 authorization URL
          schema:
            type: string
        Set-Cookie:
          description: >
            Two cookies are set: pkce_verifier and state.
            Both are HttpOnly and protect the authentication flow.
          schema:
            type: string
