get:
  summary: Get Conversation
  description: >
    Fetches a single conversation by ID.
    The caller must be a member (creator or participant).
    If the conversation does not exist OR the caller has no access, returns 404 —
    the server intentionally does not distinguish between the two cases.
  operationId: getConversationById
  tags: [Conversations]
  parameters:
    - name: id
      in: path
      description: The conversation ID to fetch
      required: true
      example: 5
      schema:
        type: integer
  security:
    - JWTAuth: []
  responses:
    "200":
      description: Conversation retrieved successfully
      content:
        application/json:
          schema:
            $ref: ../components/conversation.yml#/Conversation

    "400":
      description: Invalid conversation ID format, or missing/malformed Authorization header
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            invalidId:
              summary: Non-integer conversation ID in path
              value:
                error:
                  code: BadRequest
                  message: invalid conversation id
                  target: conversation
                  innererror:
                    code: InvalidConversationIdFormatUsedInThePath
            missingAuthHeader:
              summary: Authorization header missing
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthHeader
            invalidAuthFormat:
              summary: Header does not start with "Bearer "
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: InvalidHeaderFormat

    "401":
      description: JWT is invalid or expired
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: UnauthorizedRequest
              message: invalid token is being used
              target: token
              innererror:
                code: InvalidOrExpiredToken

    "404":
      description: Conversation not found or caller has no access
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: NotFoundRequest
              message: no data was found
              target: conversation
              innererror:
                code: NoRecordsFoundWithThatId

    "500":
      description: Internal server error — JWT decode failure, missing auth context, or DB failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            tokenDecodeFailed:
              summary: Unexpected error decoding the JWT
              value:
                error:
                  code: InternalServerError
                  message: unexpected error while trying to decode token
                  target: token
                  innererror:
                    code: UnexpectedInternalError
            missingContext:
              summary: Auth middleware did not inject user ID
              value:
                error:
                  code: InternalServerError
                  message: user id is missing in the request header
                  target: userId
                  innererror:
                    code: MissingUserIdContext

    "406":
      description: Invalid Accept header — must be application/json or */*
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: StatusNotAccepted
              message: Using invalid accept header format

    "502":
      description: Database network failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: BadGateway
              message: unexpected error on processing the request
              target: conversation
              innererror:
                code: DatabaseFailure
                innererror:
                  code: NetworkFailure

    "504":
      description: Database query timed out
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: Timeout
              message: request took so long to process
              target: conversation
              innererror:
                code: TimeOutHasBeenExceeded

