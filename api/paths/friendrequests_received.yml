get:
  summary: List Received Friend Requests
  description: >
    Returns all friend requests where the authenticated user is a party (sender_id or recipient_id)
    but NOT the author — i.e. requests sent to them by someone else.
    Each entry includes full user objects for sender, recipient, and creator.
  operationId: listReceivedFriendRequests
  tags: [FriendRequests]
  security:
    - JWTAuth: []
  responses:
    "200":
      description: Received friend requests retrieved successfully
      content:
        application/json:
          schema:
            $ref: ../components/friendrequest.yml#/FriendRequestList
          example:
            value:
              - sender:
                  id: "1"
                  displayName: Ahmed
                  email: ahmed@gmail.com
                recipient:
                  id: "4"
                  displayName: AhmedTest Mohamed
                  email: ahmedtest@gmail.com
                creator:
                  id: "1"
                  displayName: Ahmed
                  email: ahmed@gmail.com
                status: pending
                createdAt: "2026-03-05T11:22:08.048899Z"

    "400":
      description: Missing or malformed Authorization header
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            missingAuthHeader:
              summary: Authorization header missing
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthHeader
            invalidAuthFormat:
              summary: Header does not start with "Bearer "
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: InvalidHeaderFormat

    "401":
      description: JWT is invalid or expired
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: UnauthorizedRequest
              message: invalid token is being used
              target: token
              innererror:
                code: InvalidOrExpiredToken

    "500":
      description: Internal server error — JWT decode failure, missing auth context, or unexpected DB failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            tokenDecodeFailed:
              summary: Unexpected error decoding the JWT
              value:
                error:
                  code: InternalServerError
                  message: unexpected error while trying to decode token
                  target: token
                  innererror:
                    code: UnexpectedInternalError
            missingContext:
              summary: Auth middleware did not inject user ID
              value:
                error:
                  code: InternalServerError
                  message: user id is missing in the request header
                  target: userId
                  innererror:
                    code: MissingUserIdContext
            dbFailure:
              summary: Unexpected database error
              value:
                error:
                  code: InternalServerError
                  message: unexpected error on processing the request
                  target: friendRequest
                  innererror:
                    code: DatabaseFailure
                    innererror:
                      code: WrongSyntax

    "406":
      description: Invalid Accept header — must be application/json or */*
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: StatusNotAccepted
              message: Using invalid accept header format

    "502":
      description: Database network failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: BadGateway
              message: unexpected error on processing the request
              target: friendRequest
              innererror:
                code: DatabaseFailure
                innererror:
                  code: NetworkFailure

    "503":
      description: Database connection pool exhausted or server overloaded
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: ServiceUnavailable
              message: unexpected error on processing the request
              target: friendRequest
              innererror:
                code: DatabaseFailure
                innererror:
                  code: ServiceIsUnavilableDueToManyRequests

    "504":
      description: Database query timed out
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: Timeout
              message: request took so long to process
              target: friendRequest
              innererror:
                code: TimeOutHasBeenExceeded
