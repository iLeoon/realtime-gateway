patch:
  summary: Accept Received Friend Request
  description: >
    Accepts a pending friend request sent by the specified target to the authenticated user.
    Updates the friends record status from 'pending' to 'accepted'.
    sender_id and recipient_id are derived using MIN/MAX of the two user IDs — consistent with how
    friend requests are stored. The caller must NOT be the author of the request.
    Returns 404 if no pending request from the given target to the caller exists.
    Returns 204 No Content on success.
  operationId: acceptReceivedFriendRequest
  tags: [FriendRequests]
  parameters:
    - name: targetId
      in: path
      description: ID of the user who sent the friend request
      required: true
      example: 4
      schema:
        type: integer
  security:
    - JWTAuth: []
  responses:
    "204":
      description: Friend request accepted successfully — no response body

    "400":
      description: Invalid targetId format or malformed Authorization header
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            invalidId:
              summary: Non-integer targetId in path
              value:
                error:
                  code: BadRequest
                  message: invalid target user id
                  target: targetId
                  innererror:
                    code: InvalidTargetIdFormatUsedInThePath
            missingAuthHeader:
              summary: Authorization header missing
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthHeader
            invalidAuthFormat:
              summary: Header does not start with "Bearer "
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: InvalidHeaderFormat

    "401":
      description: JWT is invalid or expired
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: UnauthorizedRequest
              message: invalid token is being used
              target: token
              innererror:
                code: InvalidOrExpiredToken

    "404":
      description: No pending friend request from the given target to the authenticated user
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: NotFoundRequest
              message: no data was found
              target: friendRequest
              innererror:
                code: NoRecordsFoundWithThatId

    "500":
      description: Internal server error — JWT decode failure, missing auth context, or unexpected DB failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            tokenDecodeFailed:
              summary: Unexpected error decoding the JWT
              value:
                error:
                  code: InternalServerError
                  message: unexpected error while trying to decode token
                  target: token
                  innererror:
                    code: UnexpectedInternalError
            missingContext:
              summary: Auth middleware did not inject user ID
              value:
                error:
                  code: InternalServerError
                  message: user id is missing in the request header
                  target: userId
                  innererror:
                    code: MissingUserIdContext
            dbFailure:
              summary: Unexpected database error
              value:
                error:
                  code: InternalServerError
                  message: unexpected error on processing the request
                  target: friendRequest
                  innererror:
                    code: DatabaseFailure
                    innererror:
                      code: WrongSyntax

    "406":
      description: Invalid Accept header — must be application/json or */*
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: StatusNotAccepted
              message: Using invalid accept header format

    "502":
      description: Database network failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: BadGateway
              message: unexpected error on processing the request
              target: friendRequest
              innererror:
                code: DatabaseFailure
                innererror:
                  code: NetworkFailure

    "504":
      description: Database query timed out
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: Timeout
              message: request took so long to process
              target: friendRequest
              innererror:
                code: TimeOutHasBeenExceeded

