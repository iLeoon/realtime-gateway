delete:
  summary: Remove Friend
  description: >
    Removes an accepted friendship between the authenticated user and the specified target user.
    sender_id and recipient_id are derived using MIN/MAX of the two user IDs — consistent with how
    friend requests are stored. Returns 404 if no accepted friendship exists between the two users.
    Returns 204 No Content on success.
  operationId: deleteFriend
  tags: [Users]
  parameters:
    - name: targetId
      in: path
      description: ID of the friend to remove
      required: true
      example: 4
      schema:
        type: integer
  security:
    - JWTAuth: []
  responses:
    "204":
      description: Friendship removed successfully — no response body

    "400":
      description: Invalid targetId format or malformed Authorization header
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            invalidId:
              summary: Non-integer targetId in path
              value:
                error:
                  code: BadRequest
                  message: invalid target user id
                  target: targetId
                  innererror:
                    code: InvalidTargetIdFormatUsedInThePath
            missingAuthHeader:
              summary: Authorization header missing
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthHeader
            invalidAuthFormat:
              summary: Header does not start with "Bearer "
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: InvalidHeaderFormat

    "401":
      description: JWT is invalid or expired
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: UnauthorizedRequest
              message: invalid token is being used
              target: token
              innererror:
                code: InvalidOrExpiredToken

    "404":
      description: No accepted friendship found between the two users
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: NotFoundRequest
              message: no data was found
              target: friends
              innererror:
                code: NoRecordsFoundWithThatId

    "500":
      description: Internal server error — JWT decode failure, missing auth context, or unexpected DB failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            tokenDecodeFailed:
              summary: Unexpected error decoding the JWT
              value:
                error:
                  code: InternalServerError
                  message: unexpected error while trying to decode token
                  target: token
                  innererror:
                    code: UnexpectedInternalError
            missingContext:
              summary: Auth middleware did not inject user ID
              value:
                error:
                  code: InternalServerError
                  message: user id is missing in the request header
                  target: userId
                  innererror:
                    code: MissingUserIdContext
            dbFailure:
              summary: Unexpected database error
              value:
                error:
                  code: InternalServerError
                  message: unexpected error on processing the request
                  target: friends
                  innererror:
                    code: DatabaseFailure
                    innererror:
                      code: WrongSyntax

    "406":
      description: Invalid Accept header — must be application/json or */*
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: StatusNotAccepted
              message: Using invalid accept header format

    "502":
      description: Database network failure
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: BadGateway
              message: unexpected error on processing the request
              target: friends
              innererror:
                code: DatabaseFailure
                innererror:
                  code: NetworkFailure

    "504":
      description: Database query timed out
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          example:
            error:
              code: Timeout
              message: request took so long to process
              target: friends
              innererror:
                code: TimeOutHasBeenExceeded

    "204":
      description: Friendship removed successfully — no response body

    "400":
      description: Invalid request body, unknown fields, validation failure, or malformed Authorization header
      content:
        application/json:
          schema:
            $ref: ../components/error.yml#/Error
          examples:
            invalidJSON:
              summary: Malformed JSON or unknown field in body
              value:
                error:
                  code: BadRequest
                  message: invalid request JSON format
                  target: RequestBody
                  innererror:
                    code: InvalidFieldDataTypeOrInvalidJSONFormat
            validationError:
              summary: targetId missing or not a positive integer
              value:
                error:
                  code: BadArgumet
                  message: invalid argument
                  target: DeleteFriendBody
                  details:
                    - code: required
                      target: targetId
                      message: targetId is a required field
            missingAuthHeader:
              summary: Authorization header missing
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthHeader
            invalidAuthFormat:
              summary: Header does not start with "Bearer "
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: InvalidHeaderFormat

    "401":
      description: JWT is invalid or expired
