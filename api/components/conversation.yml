Participant:
  type: object
  description: Represents a member of a conversation
  required:
    - id
    - displayName
    - email
    - displayImage
    - joinedDate
    - role
  properties:
    id:
      type: string
      description: User's unique identifier
      example: "22"

    displayName:
      type: string
      description: User's display name
      example: ahmed.eihab

    email:
      type: string
      format: email
      description: User's email address
      example: ahmed@gmail.com

    displayImage:
      type: string
      description: URL of the user's avatar image
      example: "https://lh3.googleusercontent.com/a/photo.jpg"

    joinedDate:
      type: string
      format: date-time
      description: Timestamp when the user joined the conversation
      example: "2026-01-15T10:00:00Z"

    role:
      type: string
      description: User's role in the conversation — owner for the creator, member for everyone else
      enum: [owner, member]
      example: member

ParticipantsList:
  type: object
  required:
    - value
  properties:
    value:
      type: array
      items:
        $ref: "#/Participant"

Conversation:
  type: object
  description: Represents a conversation between two or more users
  required:
    - id
    - creatorID
    - conversationType
    - createdDate
    - participants
  properties:
    id:
      type: string
      description: Conversation's unique identifier
      example: "5"

    creatorID:
      type: string
      description: ID of the user who created the conversation
      example: "22"

    conversationType:
      type: string
      description: Type of conversation
      enum: [private-chat, group-chat]
      example: private-chat

    groupName:
      type: string
      nullable: true
      description: Display name of the group — only present for group-chat conversations
      example: "Gaming Squad"

    createdDate:
      type: string
      format: date-time
      description: Timestamp when the conversation was created
      example: "2026-01-15T10:00:00Z"

    participants:
      type: array
      description: List of members in the conversation
      items:
        $ref: "#/Participant"

ConversationCreatedResponse:
  type: object
  description: Returned after successfully creating a conversation. Does not include participants — follow the Location header to GET /conversations/{id} for the full resource.
  required:
    - id
    - creatorID
    - conversationType
    - createdDate
  properties:
    id:
      type: string
      description: Conversation's unique identifier
      example: "5"

    creatorID:
      type: string
      description: ID of the user who created the conversation
      example: "22"

    conversationType:
      type: string
      description: Type of conversation
      enum: [private-chat, group-chat]
      example: group-chat

    groupName:
      type: string
      nullable: true
      description: Display name of the group — only present for group-chat, null for private-chat
      example: "Gaming Squad"

    createdDate:
      type: string
      format: date-time
      description: Timestamp when the conversation was created
      example: "2026-01-15T10:00:00Z"

ConversationsList:
  type: object
  required:
    - value
  properties:
    value:
      type: array
      items:
        $ref: "#/Conversation"

UpdateConversationRequest:
  type: object
  description: Request body for adding participants to a group conversation.
  required:
    - participantIDs
  properties:
    participantIDs:
      type: array
      description: List of user IDs to add to the conversation. Users already in the conversation are ignored.
      minItems: 1
      maxItems: 50
      uniqueItems: true
      items:
        type: integer
        example: 44

ConversationRequest:
  type: object
  description: >
    Request body for creating a conversation.
    For private-chat, exactly one participantID must be provided and groupName must be omitted.
    For group-chat, one or more participantIDs must be provided (max 50) and groupName is required.
  required:
    - participantIDs
    - conversationType
  properties:
    participantIDs:
      type: array
      description: List of user IDs to add to the conversation (excluding the creator who is added automatically)
      minItems: 1
      maxItems: 50
      uniqueItems: true
      items:
        type: integer
        example: 33

    conversationType:
      type: string
      description: Type of conversation to create
      enum: [private-chat, group-chat]
      example: group-chat

    groupName:
      type: string
      description: Display name for the group — required for group-chat, must be between 10 and 50 characters
      minLength: 10
      maxLength: 50
      example: "Gaming Squad"
