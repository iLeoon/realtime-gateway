User:
  type: object
  description: Represents a user in the database
  required:
    - id
    - displayName
    - email
  properties:
    id:
      type: string
      description: User's unique identifier
      example: "22"

    displayName:
      type: string
      description: User's username from the external identity provider
      example: ahmed.eihab

    email:
      type: string
      description: User's email from the external identity provider
      format: email
      example: ahmed@gmail.com

    displayImage:
      type: string
      description: User's profile picture URL from Google (256px), empty string if unavailable
      example: "https://lh3.googleusercontent.com/a/photo=s256-c"

UsersList:
  type: object
  required:
    - value
  properties:
    value:
      type: array
      items:
        $ref: "#/User"
