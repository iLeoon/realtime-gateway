openapi: 3.1.0
info:
  contact: 
   email: ahmedeihab240@gmail.com
  title: realtime-gateway API
  description: A high-performance real-time messaging gateway built with WebSockets and a custom TCP engine. Features a binary framing protocol.
  version: 1.0.0
servers:
  - url: http://{host}:{port}/api/v1.0
    description: The development API server
    variables:
      host:
        default: localhost
      port:
        default: "7000"

tags:
  - name: Auth
    description: Authentication via external identity provider
  - name: Users
    description: User resource operations
  - name: Conversations
    description: Conversation and participant management
  - name: Messages
    description: Message retrieval within conversations
  - name: WebSocket
    description: WebSocket connection token issuance

paths:
  /auth/login:
    $ref: ./paths/auth.yml
  /auth/redirect/oauth/google/callback:
    $ref: ./paths/auth_callback.yml
  /users/{id}:
    $ref: ./paths/users_{id}.yml
  /ws/token:
    $ref: ./paths/ws.yml
  /conversations:
    $ref: ./paths/conversations.yml
  /conversations/{id}:
    $ref: ./paths/conversations_{id}.yml
  /conversations/{id}/participants:
    $ref: ./paths/conversations_{id}_participants.yml
  /conversations/{id}/messages:
    $ref: ./paths/conversations_{id}_messages.yml

components:
  responses:
    NotAcceptable:
      description: Invalid Accept header — must be application/json or */*
      content:
        application/json:
          schema:
            $ref: ./components/error.yml#/Error
          example:
            error:
              code: StatusNotAccepted
              message: Using invalid accept header format

    MissingAuthHeader:
      description: Authorization header is missing or malformed
      content:
        application/json:
          schema:
            $ref: ./components/error.yml#/Error
          examples:
            missingHeader:
              summary: Authorization header not present
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthHeader
            invalidFormat:
              summary: Header does not start with "Bearer "
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: InvalidHeaderFormat
            missingToken:
              summary: Bearer prefix present but token is empty
              value:
                error:
                  code: BadRequest
                  message: user is not authenticated
                  target: header
                  innererror:
                    code: MissingAuthToken

    InvalidToken:
      description: JWT is invalid or expired
      content:
        application/json:
          schema:
            $ref: ./components/error.yml#/Error
          example:
            error:
              code: UnauthorizedRequest
              message: invalid token is being used
              target: token
              innererror:
                code: InvalidOrExpiredToken

    TokenDecodeFailure:
      description: Unexpected internal error while decoding the JWT
      content:
        application/json:
          schema:
            $ref: ./components/error.yml#/Error
          example:
            error:
              code: InternalServerError
              message: unexpected error while trying to decode token
              target: token
              innererror:
                code: UnexpectedInternalError

  securitySchemes:
    GoogleOAuth:
      description: google's provider
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            openid: OpenID Connect
            email: User Email
            profile: User Profile
    JWTAuth:
      description: authenticate users with jwt
      type: http
      scheme: bearer
      bearerFormat: jwt
