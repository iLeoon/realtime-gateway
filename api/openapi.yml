openapi: 3.1.0
info:
  contact: 
   email: ahmedeihab240@gmail.com
  title: realtime-gateway API
  description: A high-performance real-time messaging gateway built with WebSockets and a custom TCP engine. Features a binary framing protocol.
  version: 1.0.0
servers:
  - url: http://{host}:{port}/api/v1.0
    description: The development API server
    variables:
      host:
        default: localhost
      port:
        default: "7000"

tags:
  - name: Auth
    description: Authentication via external identity provider
  - name: Users
    description: User resource operations
  - name: Conversations
    description: Conversation and participant management
  - name: Messages
    description: Message retrieval within conversations
  - name: FriendRequests
    description: Friend request management — send, list sent, and list received requests
  - name: WebSocket
    description: WebSocket connection token issuance

paths:
  /auth/login:
    $ref: ./paths/auth.yml
  /auth/redirect/oauth/google/callback:
    $ref: ./paths/auth_callback.yml
  /auth/logout:
    $ref: ./paths/auth_logout.yml
  /users/{id}:
    $ref: ./paths/users_{id}.yml
  /users/friends:
    $ref: ./paths/users_friends.yml
  /users/friends/{targetId}:
    $ref: ./paths/users_friends_{targetId}.yml
  /ws/token:
    $ref: ./paths/ws.yml
  /conversations:
    $ref: ./paths/conversations.yml
  /conversations/{id}:
    $ref: ./paths/conversations_{id}.yml
  /conversations/{id}/participants:
    $ref: ./paths/conversations_{id}_participants.yml
  /conversations/{id}/messages:
    $ref: ./paths/conversations_{id}_messages.yml
  /friendrequests:
    $ref: ./paths/friendrequests.yml
  /friendrequests/sent:
    $ref: ./paths/friendrequests_sent.yml
  /friendrequests/received:
    $ref: ./paths/friendrequests_received.yml
  /friendrequests/sent/{targetId}:
    $ref: ./paths/friendrequests_sent_{targetId}.yml
  /friendrequests/received/{targetId}:
    $ref: ./paths/friendrequests_received_{targetId}.yml

components:
  securitySchemes:
    GoogleOAuth:
      description: google's provider
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            openid: OpenID Connect
            email: User Email
            profile: User Profile
    JWTAuth:
      description: authenticate users with jwt
      type: http
      scheme: bearer
      bearerFormat: jwt
