name: golangci-lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  GOLANGCI_LINT_VERSION: v2.10
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
